<aside class="hidden w-80 shrink-0 border border-zinc-800 p-4 lg:block">
	<p class="mb-3 text-xs uppercase tracking-[0.2em] text-zinc-400">Website Routes</p>
	<div class="space-y-2 text-sm">
		{% for group in groups %}
			<a
				href="/web/{{ group }}"
				class="block border px-3 py-2 {{ 'border-zinc-300 text-zinc-100' if current_group == group else 'border-zinc-800 text-zinc-400 hover:border-zinc-500 hover:text-zinc-100' }}"
			>
				{{ group_meta[group]["title"] }}
			</a>
		{% endfor %}
	</div>

	{% if sidebar_operations %}
		<hr class="my-4 border-zinc-800" />
		<p class="mb-3 text-xs uppercase tracking-[0.2em] text-zinc-500">Endpoints</p>
		<div class="custom-scroll max-h-[70vh] space-y-2 overflow-y-auto pr-1 text-xs">
			{% for operation in sidebar_operations %}
				<a
					href="{{ operation.web_path }}"
					class="block border px-2 py-2 leading-relaxed {{ 'border-zinc-300 text-zinc-100' if selected_web_path and operation.web_path.rstrip('/') == selected_web_path.rstrip('/') else 'border-zinc-800 text-zinc-400 hover:border-zinc-500 hover:text-zinc-100' }}"
				>
					<div class="text-[10px] uppercase tracking-[0.16em] text-zinc-500">{{ operation.method }}</div>
					<div>{{ operation.web_path }}</div>
				</a>
			{% endfor %}
		</div>
	{% endif %}
</aside>
