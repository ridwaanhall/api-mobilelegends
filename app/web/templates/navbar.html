<header class="sticky top-0 z-30 border-b border-zinc-800 backdrop-blur-sm">
    <div class="mx-auto w-full max-w-[1600px] px-3 py-2.5 sm:px-4 lg:px-6">
        <div class="grid gap-2 border border-zinc-800 p-2.5 sm:p-3">
            <div class="flex flex-wrap items-center justify-between gap-2">
                <div class="flex min-w-0 items-center gap-2">
                    <a href="/" class="inline-flex items-center gap-1.5 border border-zinc-700 px-2.5 py-1.5 text-xs font-semibold tracking-wide text-zinc-100 hover:border-cyan-400 hover:text-cyan-200 sm:text-sm">
                        <span class="truncate">MLBB API Web</span>
                        <span class="border border-cyan-500/40 bg-cyan-950/40 px-1.5 py-0.5 text-[10px] text-cyan-200">v{{ api_version }}</span>
                    </a>
                    <span class="hidden text-[10px] uppercase tracking-[0.16em] text-zinc-500 lg:inline">Interactive Endpoint Workspace</span>
                </div>

                <div class="flex items-center gap-1.5 text-[11px] sm:text-xs">
                    <a href="https://mlbb-card.rone.dev" target="_blank" class="border border-cyan-700/70 bg-cyan-950/20 px-2 py-1 text-cyan-300 hover:border-cyan-400 hover:text-cyan-200">MLBB Card</a>
                    <a href="https://buymeacoffee.com/ridwaanhall" target="_blank" rel="noreferrer noopener" class="border border-rose-700/70 bg-rose-950/20 px-2 py-1 text-rose-300 hover:border-rose-400 hover:text-rose-200">Donate</a>
                </div>
            </div>

            <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                <div class="flex min-w-0 flex-1 items-center gap-2 overflow-x-auto whitespace-nowrap pb-1 text-[11px] sm:text-xs" aria-label="API groups">
                    {% for group in groups %}
                        <a
                            href="/web/{{ group }}"
                            class="shrink-0 border px-2.5 py-1.5 {{ 'border-cyan-500/60 bg-cyan-950/25 text-cyan-100' if current_group == group else 'border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-100' }}"
                        >
                            {{ group_meta[group]["title"] }}
                        </a>
                    {% endfor %}
                </div>

                <div class="relative flex min-w-0 flex-wrap items-center justify-end gap-1.5 text-[11px] sm:text-xs">
                    <button id="user-menu-trigger" type="button" class="inline-flex shrink-0 items-center gap-1.5 border border-zinc-700 px-2 py-1 hover:border-zinc-500">
                        <span id="user-badge" class="inline-flex items-center gap-1.5">
                            <img id="user-avatar" src="" alt="User avatar" class="h-5 w-5 border border-zinc-700 object-cover sm:h-6 sm:w-6" />
                            <span id="user-name" class="max-w-24 truncate text-zinc-200 sm:max-w-36"></span>
                        </span>
                    </button>

                    <div id="user-menu-panel" class="absolute right-0 top-full z-40 mt-1 hidden w-48 border border-zinc-700 p-2 shadow-[0_0_0_1px_rgba(255,255,255,0.03)]">
                        <span id="jwt-status" class="mb-2 block truncate border border-zinc-700 px-2.5 py-1 text-zinc-300">Not Signed In</span>
                        <button id="jwt-auth-action" type="button" class="w-full border border-zinc-700 px-2.5 py-1 text-left text-zinc-300 hover:border-zinc-400 hover:text-zinc-100">Sign In</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
