<header class="sticky top-0 z-30 border-b border-zinc-800 bg-black/80 backdrop-blur-sm">
    <div class="mx-auto w-full max-w-[1600px] px-4 py-3 lg:px-6">
        <div class="flex flex-wrap items-center justify-between gap-3 border border-zinc-800 bg-zinc-950/50 px-3 py-2">
            <div class="flex min-w-0 items-center gap-2">
                <a href="/" class="inline-flex items-center gap-2 border border-zinc-700 bg-black/60 px-3 py-1.5 text-sm font-semibold tracking-wide text-zinc-100 hover:border-cyan-400 hover:text-cyan-200">
                    <span>MLBB API Web</span>
                    <span class="border border-cyan-500/40 bg-cyan-950/40 px-1.5 py-0.5 text-[10px] text-cyan-200">v{{ api_version }}</span>
                </a>
                <span class="hidden text-[10px] uppercase tracking-[0.16em] text-zinc-500 md:inline">Interactive Endpoint Workspace</span>
            </div>

            <div class="flex flex-wrap items-center gap-2 text-xs md:text-sm">
                <a href="https://mlbb-card.rone.dev" target="_blank" class="border border-cyan-700/70 bg-cyan-950/20 px-2.5 py-1 text-cyan-300 hover:border-cyan-400 hover:text-cyan-200">
                    MLBB Card
                </a>
                <a href="https://buymeacoffee.com/ridwaanhall" target="_blank" rel="noreferrer noopener" class="border border-rose-700/70 bg-rose-950/20 px-2.5 py-1 text-rose-300 hover:border-rose-400 hover:text-rose-200">
                    Donate
                </a>
                <div id="user-badge" class="hidden items-center gap-2 border border-zinc-700 bg-black/60 px-2 py-1">
                    <img id="user-avatar" src="" alt="User avatar" class="h-6 w-6 border border-zinc-700 object-cover" />
                    <span id="user-name" class="max-w-40 truncate text-zinc-200"></span>
                </div>
                <span id="jwt-status" class="border border-zinc-700 bg-black/60 px-3 py-1 text-zinc-300">Not Signed In</span>
                <button id="jwt-auth-action" type="button" class="border border-zinc-700 bg-black/60 px-3 py-1 text-zinc-300 hover:border-zinc-400 hover:text-zinc-100">
                    Sign In
                </button>
            </div>
        </div>

        <nav class="mt-2 flex flex-wrap items-center gap-2 text-xs md:text-sm">
            {% for group in groups %}
                <a
                    href="/web/{{ group }}"
                    class="border px-3 py-1.5 {{ 'border-cyan-500/60 bg-cyan-950/25 text-cyan-100' if current_group == group else 'border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-100' }}"
                >
                    {{ group_meta[group]["title"] }}
                </a>
            {% endfor %}
        </nav>
    </div>
</header>
