<header class="sticky top-0 z-30 border-b border-zinc-800 bg-black/95 backdrop-blur">
	<div class="mx-auto flex w-full max-w-[1600px] flex-wrap items-center justify-between gap-3 px-4 py-3 lg:px-6">
        <div class="inline-flex items-baseline gap-1 border border-zinc-700 px-3 py-1 rounded">
            <a href="/" class="text-sm font-semibold tracking-wide text-zinc-100 hover:text-zinc-400">
                MLBB API Web
            </a>
            <span class="text-[10px] font-medium text-cyan-300 align-super">
                v{{ api_version }}
            </span>
        </div>

		<nav class="flex flex-wrap items-center gap-2 text-xs md:text-sm">
			<a href="/api/docs" class="border border-zinc-700 px-3 py-1 hover:border-zinc-400">Docs</a>
			<a href="/web/user" class="border border-zinc-700 px-3 py-1 hover:border-zinc-400">User</a>
			<a href="/web/mlbb" class="border border-zinc-700 px-3 py-1 hover:border-zinc-400">MLBB</a>
			<a href="/web/academy" class="border border-zinc-700 px-3 py-1 hover:border-zinc-400">Academy</a>
			<a href="/web/addon" class="border border-zinc-700 px-3 py-1 hover:border-zinc-400">Addon</a>
		</nav>

		<div class="flex items-center gap-2 text-xs md:text-sm">
			<div id="user-badge" class="hidden items-center gap-2 border border-zinc-700 px-2 py-1">
				<img id="user-avatar" src="" alt="User avatar" class="h-6 w-6 rounded-full border border-zinc-700 object-cover" />
				<span id="user-name" class="max-w-40 truncate text-zinc-200"></span>
			</div>
			<span id="jwt-status" class="border border-zinc-700 px-3 py-1 text-zinc-300">Not Signed In</span>
			<button id="jwt-auth-action" type="button" class="border border-zinc-700 px-3 py-1 text-zinc-300 hover:border-zinc-400 hover:text-zinc-100">
				Sign In
			</button>
		</div>
	</div>
</header>
