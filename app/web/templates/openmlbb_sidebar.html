<aside class="hidden w-80 shrink-0 border border-zinc-800 p-4 lg:block">
    <p class="mb-3 text-xs uppercase tracking-[0.2em] text-zinc-400">OpenMLBB Groups</p>
    <div class="space-y-2 text-sm">
        {% for group in groups %}
            <a
                href="/openmlbb/{{ group }}"
                class="block border px-3 py-2 {{ 'border-sky-400 text-zinc-100' if current_group == group else 'border-zinc-800 text-zinc-400 hover:border-zinc-500 hover:text-zinc-100' }}"
            >
                {{ group_meta[group]["title"] }}
            </a>
        {% endfor %}
    </div>

    {% if sidebar_operations %}
        <hr class="my-4 border-zinc-800" />
        <p class="mb-3 text-xs uppercase tracking-[0.2em] text-zinc-500">SDK Endpoints</p>
        <div class="custom-scroll max-h-[70vh] space-y-2 overflow-y-auto pr-1 text-xs">
            {% for operation in sidebar_operations %}
                <a
                    href="{{ operation.openmlbb_path }}"
                    class="block border px-2 py-2 leading-relaxed {{ 'border-sky-400 text-zinc-100' if selected_openmlbb_path and operation.openmlbb_path.rstrip('/') == selected_openmlbb_path.rstrip('/') else 'border-zinc-800 text-zinc-400 hover:border-zinc-500 hover:text-zinc-100' }}"
                >
                    <div class="mb-1 inline-flex border border-sky-500/60 bg-sky-950/30 px-1 py-0.2 text-[10px] uppercase tracking-[0.16em] text-sky-300">{{ operation.method }}</div>
                    <div>{{ operation.openmlbb_path }}</div>
                </a>
            {% endfor %}
        </div>
    {% endif %}
</aside>
