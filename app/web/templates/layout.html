<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>{{ title if title else "MLBB Web Interface" }}</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<style>
		html,
		body {
			overflow-x: hidden;
			scrollbar-color: #52525b #09090b;
			scrollbar-width: thin;
			font-family: "Plus Jakarta Sans", sans-serif;
		}

		code,
		pre,
		.font-mono {
			font-family: "Space Mono", monospace;
		}

		*::-webkit-scrollbar {
			width: 10px;
			height: 10px;
		}

		*::-webkit-scrollbar-track {
			background: #09090b;
		}

		*::-webkit-scrollbar-thumb {
			background: #3f3f46;
			border: 2px solid #09090b;
			border-radius: 999px;
		}

		*::-webkit-scrollbar-thumb:hover {
			background: #52525b;
		}
	</style>
</head>
<body class="min-h-screen overflow-x-hidden bg-black text-zinc-100">
	{% include "navbar.html" %}

	<div class="mx-auto flex w-full max-w-[1600px] min-w-0 gap-4 px-4 pb-8 pt-6 lg:px-6">
		{% if request.url.path.startswith('/web') %}
			{% include "sidebar.html" %}
		{% endif %}

		<main class="w-full min-w-0 overflow-x-hidden">
			{% block content %}{% endblock %}
		</main>
	</div>

	{% include "footer.html" %}
	{% block scripts %}{% endblock %}
</body>
</html>
