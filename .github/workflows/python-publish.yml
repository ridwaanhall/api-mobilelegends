name: Publish Python Package

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

env:
  ENABLE_NON_MAIN_PRERELEASE: "false"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      should_publish: ${{ steps.version.outputs.should_publish }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Generate release version
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SHOULD_RELEASE="false"
          SHOULD_PUBLISH="false"
          PRERELEASE="false"

          if [ "${BRANCH}" = "main" ]; then
            SHOULD_RELEASE="true"
            SHOULD_PUBLISH="true"
          elif [ "${ENABLE_NON_MAIN_PRERELEASE}" = "true" ]; then
            SHOULD_RELEASE="true"
            SHOULD_PUBLISH="false"
            PRERELEASE="true"
          fi

          BASE_VERSION="4.0.${GITHUB_RUN_NUMBER}"
          if [ "${PRERELEASE}" = "true" ]; then
            VERSION="${BASE_VERSION}rc${GITHUB_RUN_ATTEMPT}"
          elif [ "${GITHUB_RUN_ATTEMPT}" -gt 1 ]; then
            VERSION="${BASE_VERSION}.post${GITHUB_RUN_ATTEMPT}"
          else
            VERSION="${BASE_VERSION}"
          fi

          TAG="${VERSION}"

          echo "should_release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${SHOULD_PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}

  build:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.should_release == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set package version
        run: |
          cat > OpenMLBB/src/OpenMLBB/_version.py << EOF
          """Package version for OpenMLBB."""

          __version__ = "${{ needs.release.outputs.version }}"
          EOF

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: |
          python -m build

      - name: Validate release version
        run: |
          ls -la dist
          if ls dist/*dev* >/dev/null 2>&1; then
            echo "Found dev version artifact, expected release version."
            exit 1
          fi

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-dists
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs:
      - release
      - build
    if: needs.release.outputs.should_publish == 'true'
    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/OpenMLBB/${{ needs.release.outputs.version }}/

    steps:
      - name: Retrieve distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/